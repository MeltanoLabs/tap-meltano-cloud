send_anonymous_usage_stats: true
project_id: tap-meltanocloud
default_environment: test
requires_meltano: '>=4.0'
environments:
- name: test
plugins:
  extractors:
  - name: tap-meltanocloud
    namespace: tap_meltanocloud
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings_group_validation:
    - [auth_token]

    settings:
    - name: auth_token
      label: Auth Token
      description: The token to authenticate against the API service

      sensitive: true
    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: Initial date to start extracting data from

    config:
      start_date: 6 months ago

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-duckdb
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/target-duckdb.git
