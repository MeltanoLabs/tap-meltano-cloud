send_anonymous_usage_stats: true
project_id: tap-meltano-cloud
default_environment: test
requires_meltano: '>=4.0'
environments:
- name: test
plugins:
  extractors:
  - name: tap-meltano-cloud
    namespace: tap_meltano_cloud
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings_group_validation:
    - [auth_token]

    settings:
    - name: auth_token
      label: Auth Token
      description: The token to authenticate against the API service
      sensitive: true

    - name: workspace_ids
      kind: array
      label: Workspace IDs
      description: >-
        List of workspace IDs to sync. When set, only the specified workspaces
        are fetched individually without requiring the workspaces list endpoint.
        When omitted, all workspaces accessible to the authenticated user are
        discovered and synced.

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-duckdb
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/target-duckdb.git
